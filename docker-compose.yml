services:
  agentwish:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
      - /data/agentwish:/data
    environment:
      - DATABASE_PATH=/data/agentwish.db
      - PORT=5000
      - API_KEY_SALT=agentwish_2024_secure_salt_v1
      - ADMIN_AGENT_IDS=5721e90e-51ac-4d40-a36c-241d66ab15eb
    command: bash -c "pip install --no-cache-dir -r requirements.txt -q && python app.py"
    ports:
      - "5000:5000"
    restart: always
